<svg xmlns="http://www.w3.org/2000/svg" width="360" height="480" viewBox="0 0 360 480">
  <!-- 背景卡片 -->
  <rect x="40" y="20" width="280" height="440" rx="28" fill="#F6F8FC"></rect>

  <!-- 机器人头部（替代原来的圆头像） -->
  <rect x="130" y="115" width="100" height="80" rx="24" fill="#DDE2EB"></rect>
  <!-- 眼睛 -->
  <circle cx="155" cy="150" r="8.5" fill="#4F6BFF"></circle>
  <circle cx="205" cy="150" r="8.5" fill="#4F6BFF"></circle>
  <!-- 嘴巴 -->
  <rect x="155" y="170" width="50" height="10" rx="5" fill="#C3CAD7"></rect>

  <!-- 躯干，保持和真实患者一致 -->
  <rect x="120" y="220" width="120" height="150" rx="28" fill="#DDE2EB"></rect>

  <!-- 蓝色圆形徽章 -->
  <circle cx="240" cy="260" r="32" fill="#8B5CF6"></circle>

  <!-- 白色 V（Virtual） -->
  <text x="240" y="270" text-anchor="middle" font-size="26" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" fill="#FFFFFF">
    V
  </text>
</svg>
