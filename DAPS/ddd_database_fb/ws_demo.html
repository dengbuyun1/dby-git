<!doctype html>
<html lang="zh-CN">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>WS Demo - sin/cos/tan</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 10px;
			background: #f5f7fa
		}

		.row {
			display: flex;
			gap: 10px;
		}

		.chart {
			width: 32%;
			height: 300px;
			background: #fff;
			border: 1px solid #eaeaea;
			border-radius: 6px;
		}

		header {
			margin-bottom: 10px
		}
	</style>
</head>

<body>
	<header>
		<h2>WebSocket 实时演示（sin / cos / tan）</h2>
		<p>连接地址： <code id="wsUrl">ws://localhost:8765</code></p>
	</header>
	<div class="row">
		<div id="chart-sin" class="chart"></div>
		<div id="chart-cos" class="chart"></div>
		<div id="chart-tan" class="chart"></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
	<script>
		const WS_URL = 'ws://localhost:8765'
		document.getElementById('wsUrl').textContent = WS_URL

		const sinChart = echarts.init(document.getElementById('chart-sin'))
		const cosChart = echarts.init(document.getElementById('chart-cos'))
		const tanChart = echarts.init(document.getElementById('chart-tan'))

		const optBase = (title) => ({
			title: { text: title, left: 'center' },
			xAxis: { type: 'category', boundaryGap: false, data: [] },
			yAxis: { type: 'value' },
			series: [{ name: title, type: 'line', data: [], smooth: true }]
		})

		sinChart.setOption(optBase('sin'))
		cosChart.setOption(optBase('cos'))
		tanChart.setOption(optBase('tan'))

		const maxPoints = 200
		let ws = null

		function pushPoint(chart, x, y) {
			const option = chart.getOption()
			const xdata = option.xAxis[0].data
			const sdata = option.series[0].data
			xdata.push(String(x))
			sdata.push(y === null ? null : Number(y.toFixed(6)))
			if (xdata.length > maxPoints) { xdata.shift(); sdata.shift(); }
			chart.setOption({ xAxis: { data: xdata }, series: [{ data: sdata }] })
		}

		function connect() {
			ws = new WebSocket(WS_URL)
			ws.onopen = () => console.log('WS open')
			ws.onmessage = (ev) => {
				try {
					const d = JSON.parse(ev.data)
					// expect {i, sin, cos, tan}
					const i = d.i
					pushPoint(sinChart, i, d.sin)
					pushPoint(cosChart, i, d.cos)
					pushPoint(tanChart, i, d.tan)
				} catch (e) {
					console.error('parse', e)
				}
			}
			ws.onclose = () => {
				console.log('WS closed, reconnect in 2s')
				setTimeout(connect, 2000)
			}
			ws.onerror = (e) => console.error('WS err', e)
		}

		connect()

		window.addEventListener('resize', () => {
			sinChart.resize(); cosChart.resize(); tanChart.resize();
		})
	</script>
</body>

</html>
